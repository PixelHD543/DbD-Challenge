<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dead by Daylight - Challenge Generator | Official Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dbd-container">
        <!-- Header -->
        <header class="dbd-header">
            <div class="logo-section">
                <div class="skull-icon">💀</div>
                <h1>DEAD BY DAYLIGHT</h1>
                <div class="skull-icon">🔪</div>
            </div>
            <p class="tagline">CHALLENGE GENERATOR • DRINKING MODE • MULTI-PLAYER</p>
        </header>

        <!-- Global Controls Bar -->
        <div class="global-controls">
            <div class="filter-group">
                <label>🎮 ROLE FILTER</label>
                <select id="roleFilter" class="dbd-select">
                    <option value="mixed">MIXED (Survivor/Killer)</option>
                    <option value="survivor">SURVIVOR ONLY</option>
                    <option value="killer">KILLER ONLY</option>
                </select>
            </div>
            <div class="filter-group">
                <label>⭐ DIFFICULTY</label>
                <select id="difficultyFilter" class="dbd-select">
                    <option value="all">ALL DIFFICULTIES</option>
                    <option value="easy">EASY</option>
                    <option value="medium">MEDIUM</option>
                    <option value="hard">HARD</option>
                    <option value="extreme">EXTREME</option>
                </select>
            </div>
            <div class="filter-group">
                <label>🍺 MODE</label>
                <div class="mode-toggle">
                    <button class="mode-option" data-mode="normal">NORMAL</button>
                    <button class="mode-option active" data-mode="drinking">DRINKING</button>
                </div>
            </div>
            <button id="globalGenerateBtn" class="dbd-btn-primary">🎲 NEW CHALLENGES FOR ALL</button>
        </div>

        <!-- Players Grid -->
        <div class="players-grid" id="playersGrid">
            <!-- Player cards will be dynamically inserted here -->
        </div>

        <!-- Add Player Button -->
        <div class="add-player-container">
            <button id="addPlayerBtn" class="dbd-btn-add">+ ADD PLAYER (MAX 5)</button>
        </div>

        <!-- Global History -->
        <div class="history-panel">
            <div class="history-header">
                <h3>📜 RECENT ACTIVITY</h3>
                <button id="clearHistoryBtn" class="clear-history-btn">CLEAR</button>
            </div>
            <ul id="historyList" class="history-list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
